<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全模块方体卡片交互 Demo</title>
  <style>
    :root {
      --primary: #2d5dff;
      --primary-soft: rgba(45, 126, 255, 0.12);
      --border: rgba(45, 93, 255, 0.13);
      --border-strong: rgba(45, 93, 255, 0.2);
      --text: #1e2735;
      --secondary: #536074;
      --muted: #7f8898;
      --page: #f6f8fc;
      --surface: rgba(255, 255, 255, 0.96);
      --panel: rgba(246, 250, 255, 0.98);
      --shadow: 0 10px 24px rgba(32, 57, 96, 0.05);
      --radius: 5px;
      --gap: 10px;
      --blue: #2f8dff;
      --red: #eb4d56;
      --orange: #f0aa32;
      --green: #36b37e;
      --purple: #6f7dff;
      --teal: #12887a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--page);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 13px;
    }

    .app {
      display: grid;
      grid-template-columns: 278px minmax(0, 1fr);
      height: 100vh;
    }

    .sidebar {
      overflow-y: auto;
      border-right: 1px solid rgba(63, 80, 104, 0.09);
      background: rgba(255, 255, 255, 0.94);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 82px;
      padding: 0 18px;
      border-bottom: 1px solid rgba(63, 80, 104, 0.08);
      font-size: 18px;
      font-weight: 800;
    }

    .brand-icon,
    .nav-icon,
    .metric-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      background: var(--primary-soft);
      color: var(--primary);
      flex: 0 0 auto;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      font-size: 18px;
    }

    .nav {
      display: grid;
      gap: 8px;
      padding: 26px 14px 16px;
    }

    .nav-group {
      margin-top: 8px;
      padding: 10px 0 4px;
      color: #b96521;
      font-size: 12px;
      font-weight: 800;
    }

    .nav button {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      height: 40px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--secondary);
      font: inherit;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .nav button:hover,
    .nav button.active {
      border-color: rgba(45, 93, 255, 0.18);
      background: var(--panel);
      color: var(--text);
    }

    .nav-icon {
      width: 26px;
      height: 26px;
      font-size: 13px;
      background: rgba(45, 93, 255, 0.08);
    }

    .main {
      display: grid;
      grid-template-rows: 78px minmax(0, 1fr);
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 0 18px;
      border-bottom: 1px solid rgba(63, 80, 104, 0.08);
      background: rgba(255, 255, 255, 0.92);
    }

    .search,
    .button,
    .select {
      height: 30px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--secondary);
    }

    .search {
      display: flex;
      align-items: center;
      width: 290px;
      padding: 0 10px;
      white-space: nowrap;
    }

    .button {
      padding: 0 12px;
      color: var(--text);
      font-weight: 700;
    }

    .content {
      overflow: auto;
      padding: 18px;
    }

    .board {
      display: grid;
      gap: var(--gap);
    }

    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 92px;
      padding: 18px 22px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.2;
    }

    .hero p {
      margin-top: 8px;
      color: var(--secondary);
      font-size: 14px;
    }

    .toolbar,
    .tabs,
    .panel-title,
    .row-actions,
    .status,
    .inline {
      display: flex;
      align-items: center;
    }

    .toolbar {
      gap: 8px;
      flex-wrap: wrap;
    }

    .tabs {
      height: 30px;
      padding: 1px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .tab {
      min-width: 66px;
      height: 26px;
      padding: 0 10px;
      border-left: 1px solid rgba(45, 93, 255, 0.12);
      color: var(--secondary);
      font-size: 12px;
      line-height: 26px;
      text-align: center;
      white-space: nowrap;
    }

    .tab:first-child {
      border-left: 0;
    }

    .tab.active {
      background: var(--primary-soft);
      color: #155bd6;
      box-shadow: inset 0 0 0 1px rgba(45, 126, 255, 0.45);
    }

    .divider {
      width: 1px;
      height: 22px;
      background: rgba(116, 142, 184, 0.18);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--gap);
    }

    .metric-grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .metric-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 96px;
      padding: 14px 16px;
    }

    .metric-card span,
    .subtle {
      color: var(--secondary);
      font-size: 12px;
    }

    .metric-card strong {
      display: block;
      margin-top: 7px;
      font-size: 32px;
      line-height: 1;
    }

    .metric-card small {
      display: block;
      margin-top: 8px;
      color: var(--secondary);
      font-size: 13px;
    }

    .metric-card b {
      color: #df4a55;
    }

    .metric-icon {
      width: 50px;
      height: 50px;
      font-size: 26px;
    }

    .metric-icon.red {
      color: var(--red);
      background: rgba(235, 77, 86, 0.12);
    }

    .metric-icon.orange {
      color: var(--orange);
      background: rgba(238, 157, 41, 0.13);
    }

    .metric-icon.green {
      color: var(--green);
      background: rgba(54, 179, 126, 0.13);
    }

    .metric-icon.purple {
      color: var(--purple);
      background: rgba(111, 125, 255, 0.12);
    }

    .chart-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(360px, 0.9fr);
      gap: var(--gap);
    }

    .panel {
      min-width: 0;
      padding: 12px;
    }

    .panel-title {
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-title h2,
    .panel-title h3 {
      font-size: 16px;
    }

    .chart {
      width: 100%;
      height: 230px;
      border: 1px solid rgba(45, 93, 255, 0.1);
      border-radius: var(--radius);
      background:
        linear-gradient(to bottom, rgba(45, 93, 255, 0.08) 1px, transparent 1px) 0 0 / 100% 46px,
        rgba(255, 255, 255, 0.78);
      overflow: hidden;
    }

    .chart svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .bar-list {
      display: grid;
      gap: 12px;
      padding: 14px 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 52px;
      align-items: center;
      gap: 10px;
      color: var(--secondary);
      font-size: 12px;
    }

    .bar-track {
      height: 14px;
      overflow: hidden;
      border-radius: 4px;
      background: rgba(45, 93, 255, 0.08);
    }

    .bar-track i {
      display: block;
      height: 100%;
      border-radius: 4px;
      background: var(--teal);
    }

    .split-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(330px, 0.75fr);
      gap: var(--gap);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      overflow: hidden;
      border: 1px solid rgba(45, 93, 255, 0.14);
      border-radius: var(--radius);
      background: #fff;
    }

    th,
    td {
      height: 34px;
      padding: 0 7px;
      border-bottom: 1px solid rgba(45, 93, 255, 0.1);
      overflow: hidden;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      background: var(--panel);
      color: var(--secondary);
      font-weight: 700;
      text-align: left;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .pill,
    .status {
      width: fit-content;
      height: 22px;
      padding: 0 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1266cc;
      background: #e8f3ff;
    }

    .pill.red {
      color: #c83338;
      background: rgba(229, 85, 87, 0.12);
    }

    .pill.orange {
      color: #b66a00;
      background: rgba(255, 173, 76, 0.16);
    }

    .pill.green {
      color: #178b5f;
      background: rgba(54, 179, 126, 0.14);
    }

    .status {
      gap: 5px;
      color: #178b5f;
      background: rgba(54, 179, 126, 0.14);
    }

    .status::before {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      content: "";
    }

    .info-grid {
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      row-gap: 10px;
      column-gap: 10px;
      padding: 10px;
      border: 1px solid rgba(45, 93, 255, 0.1);
      border-radius: var(--radius);
      background: var(--panel);
      font-size: 12px;
    }

    .control-grid,
    .source-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--gap);
    }

    .control-card,
    .source-card {
      display: grid;
      gap: 9px;
      min-height: 104px;
      padding: 11px;
      border: 1px solid rgba(45, 93, 255, 0.1);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 4px;
      background: rgba(45, 93, 255, 0.08);
    }

    .progress i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .netdisk-board {
      display: grid;
      gap: 10px;
    }

    .netdisk-table {
      overflow: hidden;
      border: 1px solid rgba(45, 93, 255, 0.14);
      border-radius: var(--radius);
    }

    @media (max-width: 1280px) {
      .app {
        grid-template-columns: 82px minmax(0, 1fr);
      }

      .brand span,
      .nav button span:not(.nav-icon) {
        display: none;
      }

      .metric-grid,
      .metric-grid.four,
      .chart-grid,
      .split-grid,
      .control-grid,
      .source-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

          ['公开索引员工名册', 'Google', '员工信息', '高危', '2026-06-18 16:12', '有效'],
          ['供应商合同搜索命中', 'Bing', '合同信息', '中危', '2026-06-18 13:55', '需验证'],
          ['产品资料页面快照', 'DuckDuckGo', '产品资料', '低危', '2026-06-18 09:15', '有效'],
        ],
      },
      netdisk: {
        title: '网盘监测',
        desc: '网盘监测保持之前已经确认的方体卡片样式，不作为本次改动对象。',
        icon: '网',
        color: '',
        netdisk: true,
        metrics: [['发现分享链接', '21', '较昨日 100.0%'], ['高危文件', '5', '较昨日 21.1%'], ['口令分享', '1', '较昨日 16.3%'], ['已失效链接', '6', '较昨日 9.4%']],
        rows: [
          ['宁德时代供应链深度分析-60页.pdf', '阿里云盘', '宁德时代', '高危', '2026-06-18 17:32', '有效'],
          ['电力设备新能源行业报告.pdf', '阿里云盘', '宁德时代', '高危', '2026-06-18 17:32', '有效'],
          ['宁德时代超级科技日媒体素材包', '百度网盘', '宁德时代', '中危', '2026-06-18 17:32', '需验证'],
          ['动力电池巨头布局储能.pdf', '阿里云盘', '宁德时代', '低危', '2026-06-16 18:01', '有效'],
        ],
      },
      library: {
        title: '文库监测',
        desc: '文库详情、预览、文件清单和命中关键词卡片统一成低圆角方体。',
        icon: '库',
        color: 'orange',
        metrics: [['文档命中', '38', '近 7 天'], ['页面截图', '16', '已留证'], ['来源站点', '4', '公开文库']],
        chartTitle: '文库命中趋势',
        sideTitle: '文库来源分布',
        bars: [['百度文库', 78], ['道客巴巴', 54], ['原创力', 36], ['豆丁', 24], ['其他', 18]],
        rows: [
          ['商业案例课页面快照', '百度文库', '宁德时代', '中危', '2026-06-18 17:32', '新发现'],
          ['供应链案例分析文档', '道客巴巴', '供应链', '中危', '2026-06-18 13:20', '有效'],
          ['新能源行业报告预览', '原创力', '新能源', '低危', '2026-06-18 10:05', '有效'],
          ['内部培训材料截图', '豆丁', '培训资料', '高危', '2026-06-17 19:42', '需验证'],
        ],
      },
      code: {
        title: '代码监测',
        desc: '代码监测的仓库、密钥、扫描历史和详情卡片改为同样方体、同样紧凑间距。',
        icon: '码',
        color: 'purple',
        metrics: [['命中仓库', '23', '公开平台'], ['密钥线索', '7', 'AccessKey / Token'], ['误报', '3', '已排除']],
        chartTitle: '代码命中趋势',
        sideTitle: '平台分布',
        bars: [['GitHub', 86], ['Gitee', 42], ['GitLab', 28], ['Bitbucket', 16], ['其他', 12]],
        rows: [
          ['AccessKey 泄露提交记录', 'GitHub', '访问令牌', '高危', '2026-06-18 17:32', '待处置'],
          ['配置文件包含数据库口令', 'Gitee', '数据库密码', '高危', '2026-06-18 15:10', '有效'],
          ['测试 Token 出现在历史提交', 'GitHub', 'Token', '中危', '2026-06-18 11:22', '需验证'],
          ['样例代码误报规则命中', 'GitLab', '样例密钥', '低危', '2026-06-17 20:44', '误报'],
        ],
      },
    }

    function pill(text) {
      const cls = text === '紧急' || text === '高危' ? 'red' : text === '中危' || text === '需验证' || text === '待处置' ? 'orange' : 'green'
      return `<span class="pill ${cls}">${text}</span>`
    }

    function chart(color = '#2f8dff') {
      return `
        <div class="chart">
          <svg viewBox="0 0 720 230" preserveAspectRatio="none">
            <path d="M0 190 L90 162 L180 168 L270 136 C330 104 362 42 424 54 C500 70 516 188 590 168 L720 112 L720 230 L0 230 Z" fill="${color}22"></path>
            <path d="M0 190 L90 162 L180 168 L270 136 C330 104 362 42 424 54 C500 70 516 188 590 168 L720 112" fill="none" stroke="${color}" stroke-width="4"></path>
          </svg>
        </div>
      `
    }

    function bars(page) {
      const rows = page.bars || []
      return `<div class="bar-list">${rows.map(([name, value]) => `
        <div class="bar-row"><strong>${name}</strong><div class="bar-track"><i style="width:${value}%"></i></div><span>${value}</span></div>
      `).join('')}</div>`
    }

    function table(rows) {
      return `
        <table>
          <colgroup>
            <col style="width:30%"><col style="width:15%"><col style="width:18%"><col style="width:10%"><col style="width:17%"><col style="width:10%">
          </colgroup>
          <thead><tr><th>标题 / 文件名</th><th>来源</th><th>命中对象</th><th>等级</th><th>发现时间</th><th>状态</th></tr></thead>
          <tbody>${rows.map((row) => `
            <tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${pill(row[3])}</td><td>${row[4]}</td><td><span class="status">${row[5]}</span></td></tr>
          `).join('')}</tbody>
        </table>
      `
    }

    function collector(page) {
      return `
        <section class="control-grid">
          ${['暗网采集', '搜索采集', '网盘采集', '代码采集'].map((name, index) => `
            <article class="control-card">
              <strong>${name}</strong>
              <span class="status">运行</span>
              <span class="subtle">最近执行 ${index + 2} 分钟前</span>
              <div class="progress"><i style="width:${[76, 64, 82, 58][index]}%"></i></div>
            </article>
          `).join('')}
        </section>
        <section class="split-grid">
          <article class="card panel"><div class="panel-title"><h2>采集任务列表</h2><span class="subtle">卡片间距 10px</span></div>${table(page.rows)}</article>
          <article class="card panel"><div class="panel-title"><h2>执行状态</h2><span class="pill green">正常</span></div><div class="info-grid">
            <span class="subtle">当前任务</span><strong>12</strong><span class="subtle">失败任务</span><strong>2</strong>
            <span class="subtle">队列长度</span><strong>18</strong><span class="subtle">最近同步</span><strong>2026-06-18 17:32</strong>
          </div></article>
        </section>
      `
    }

    function render(pageKey) {
      const page = pages[pageKey]
      const pageEl = document.querySelector('#page')
      const metricClass = page.netdisk ? 'metric-grid four' : 'metric-grid'
      const color = page.color === 'red' ? '#eb4d56' : page.color === 'orange' ? '#f0aa32' : page.color === 'purple' ? '#6f7dff' : page.color === 'green' ? '#36b37e' : '#2f8dff'
      pageEl.innerHTML = `
        <section class="card hero">
          <div><h1>${page.title}</h1><p>${page.desc}</p></div>
          <div class="metric-icon ${page.color || ''}">${page.icon}</div>
        </section>
        <section class="toolbar">
          <div class="tabs"><span class="tab active">近7天</span><span class="tab">近30天</span><span class="tab">自定义</span></div>
          <span class="divider"></span>
          <button class="button">刷新数据</button><button class="button">导出</button>
        </section>
        <section class="${metricClass}">
          ${page.metrics.map((item, index) => `
            <article class="card metric-card">
              <div><span>${item[0]}</span><strong>${item[1]}</strong><small>${item[2]}</small></div>
              <div class="metric-icon ${index === 1 ? 'red' : index === 2 ? 'orange' : page.color || ''}">${index + 1}</div>
            </article>
          `).join('')}
        </section>
        ${page.collector ? collector(page) : `
          <section class="chart-grid">
            <article class="card panel"><div class="panel-title"><h2>${page.chartTitle || '趋势图'}</h2><span class="subtle">统一方体图表卡</span></div>${chart(color)}</article>
            <article class="card panel"><div class="panel-title"><h2>${page.sideTitle || '分布'}</h2><span class="subtle">紧凑列表</span></div>${bars(page)}</article>
          </section>
          <section class="split-grid">
            <article class="card panel"><div class="panel-title"><h2>${page.netdisk ? '检测结果列表（网盘保持现状）' : '检测结果列表'}</h2><span class="subtle">方体列表卡</span></div><div class="${page.netdisk ? 'netdisk-table' : ''}">${table(page.rows)}</div></article>
            <article class="card panel"><div class="panel-title"><h2>详情 / 配置摘要</h2><span class="pill green">new</span></div><div class="info-grid">
              <span class="subtle">所属模块</span><strong>${page.title}</strong>
              <span class="subtle">监测对象</span><strong>宁德时代</strong>
              <span class="subtle">卡片圆角</span><strong>5px 方体</strong>
              <span class="subtle">板块间距</span><strong>10px 紧凑</strong>
              <span class="subtle">最近发现</span><strong>2026-06-18 17:32</strong>
            </div></article>
          </section>
        `}
      `
      document.querySelectorAll('#nav button').forEach((button) => button.classList.toggle('active', button.dataset.module === pageKey))
    }

    document.querySelector('#nav').addEventListener('click', (event) => {
      const button = event.target.closest('button[data-module]')
      if (button) render(button.dataset.module)
    })

    render('situation')
  </script>
</body>
</html>
